# EverMCP Example Configuration
# Copy to ~/.evermcp/config.toml and modify as needed.

[general]
log_level = "INFO"  # DEBUG, INFO, WARNING, ERROR
log_file = "~/.evermcp/evermcp.log"

[ffmpeg]
binary = "ffmpeg"  # or absolute path, e.g. "/usr/local/bin/ffmpeg"
# Default per-tool timeout in seconds for ffmpeg-based tools (when supported).
# Tools that don't use ffmpeg may ignore this.
default_timeout_s = 600

[security]
filesystem_allowlist = ["~/data", "~/Downloads"]
network_allowlist = ["github.com", "pypi.org"]
denied_paths = ["~/.ssh", "~/.aws", "~/.config/gh"]

# Gateway — Streamable HTTP transport + Web UI
# Bind to loopback by default; override only if you understand the security
# implications (remote clients authenticate via API key; see SECURITY.md).
[gateway]
host = "127.0.0.1"
port = 8787
# Require API key for HTTP MCP endpoints (default false for local use).
require_key = false
# SQLite path for the persistence layer (InlineCapability, Client, ApiKey, CallLog).
db_url = "sqlite:///~/.evermcp/evermcp.db"
# Per-call timeout (seconds) for remote client tools over WebSocket.
remote_call_timeout_s = 60